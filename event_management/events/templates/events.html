{% extends 'base.html' %}

{% block title %}Events - Event Management{% endblock %}

{% block content %}
    <h2 class="text-center">Our Events</h2>
    <div class="row">
        {% for event in events %}
            <div class="col-md-4">
                <div class="card mb-3">
                    <img src="{{ event.image.url }}" class="card-img-top" alt="{{ event.title }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ event.title }}</h5>
                        <p class="card-text">{{ event.description }}</p>
                        <a href="{% url 'event_detail' event.id %}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
