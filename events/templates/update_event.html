{% extends 'base.html' %}

{% block title %}Edit Event{% endblock %}

{% block content %}
<style>
    .event-form-container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .event-form-container h2 {
        text-align: center;
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 20px;
    }

    .form-label {
        font-weight: 500;
        color: var(--dark);
    }

    .form-control {
        border-radius: 8px;
        padding: 10px;
        border: 1px solid var(--gray);
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 5px rgba(46, 139, 87, 0.2);
    }

    .btn-submit {
        background-color: var(--primary);
        color: white;
        font-size: 1.1rem;
        font-weight: 500;
        padding: 12px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        background-color: var(--primary-dark);
    }
</style>

<div class="container py-5">
    <div class="event-form-container">
        <h2>Edit Event</h2>
        
        <form method="POST" enctype="multipart/form-data" class="fade-in">
            {% csrf_token %}
            
            <!-- Title -->
            <div class="mb-3">
                <label for="id_title" class="form-label">Title:</label>
                <input type="text" name="title" id="id_title" class="form-control" value="{{ event.title }}" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label for="id_description" class="form-label">Description:</label>
                <textarea name="description" id="id_description" class="form-control" rows="4" required>{{ event.description }}</textarea>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label for="id_category" class="form-label">Category:</label>
                <div class="form-select">{{ form.category }}</div>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label for="id_price" class="form-label">Price:</label>
                <input type="number" name="price" id="id_price" class="form-control" value="{{ event.price }}" required>
            </div>

            <!-- Event Image (Current Image Display) -->
            <div class="mb-3">
                <label for="id_image" class="form-label">Event Image:</label>
                <input type="file" name="image" id="id_image" class="form-control">
                {% if event.image %}
                    <p>Current Image: <img src="{{ event.image.url }}" alt="Current Event Image" width="100" height="100"></p>
                {% endif %}
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-submit w-100">Update Event</button>
        </form>
    </div>
</div>
{% endblock %}
