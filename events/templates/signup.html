{% extends 'base.html' %}

{% block title %}Sign Up - Event Management{% endblock %}

{% block content %}
<style>
    /* Scoped modern styles for the Sign Up page */
    .signup-page {
        --primary: #2E8B57;         /* Sea Green */
        --primary-dark: #1D6841;    /* Darker Sea Green */
        --secondary: #FFA500;       /* Orange */
        --light: #F7F9FB;           /* Off-White */
        --dark: #292F36;            /* Dark Blue-Gray */
        --gray: #6C757D;
        --accent: #FF6B6B;          /* Coral */
        --focus: rgba(46, 139, 87, 0.3);
    }

    .signup-page body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--light);
        color: var(--dark);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .signup-page {
        max-width: 600px; /* Reduced width */
        width: 100%;
        padding: 40px;
        background-color: white;
        border-radius: 12px;
        border: 1px solid #ddd; /* Added border */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
    }

    .signup-page:hover {
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }

    .signup-page h2 {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 30px;
    }

    /* Form Styles */
    .signup-page .form-control {
        border-radius: 12px;
        padding: 15px;
        font-size: 1rem;
        border: 1px solid #ddd;
        margin-bottom: 20px;
        background-color: var(--light);
        transition: border 0.3s, box-shadow 0.3s ease;
    }

    .signup-page .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 8px var(--focus);
    }

    .signup-page label {
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--dark);
        display: block;
    }

    /* Button Styling */
    .signup-page .btn-primary {
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 15px;
        font-size: 1.1rem;
        font-weight: 600;
        width: 100%;
        transition: background-color 0.3s, transform 0.3s ease;
        cursor: pointer;
    }

    .signup-page .btn-primary:hover {
        background-color: var(--primary-dark);
        transform: translateY(-3px);
    }

    .signup-page .btn-primary:active {
        transform: translateY(1px);
    }

    /* Error Message */
    .signup-page .alert {
        background-color: #f8d7da;
        color: #721c24;
        border-color: #f5c6cb;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 0.9rem;
    }

    /* Footer Text */
    .signup-page p {
        font-size: 0.9rem;
        text-align: center;
        color: var(--dark);
    }

    .signup-page a {
        color: var(--primary);
        text-decoration: none;
    }

    .signup-page a:hover {
        text-decoration: underline;
    }

    /* Responsive Design for Mobile */
    @media (max-width: 768px) {
        .signup-page {
            padding: 20px;
        }

        .signup-page h2 {
            font-size: 2rem;
        }

        .signup-page .btn-primary {
            padding: 12px;
            font-size: 1rem;
        }
    }
</style>

<div class="container signup-page">
    <h2>Sign Up</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username:</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email:</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Phone Number:</label>
            <input type="text" name="phone" class="form-control">
        </div>

        <div class="mb-3">
            <label>Address:</label>
            <textarea name="address" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Password:</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Confirm Password:</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <p class="mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>

{% endblock %}
